<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Chat with boxing fans on FaceHook.">
  <title>Chat — FaceHook</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/chat.css">
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo">
        <img src="../assets/images/logo.png" alt="FaceHook">
        <span>Face</span><span class="logo-hook">Hook</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="feed.html">Feed</a></li>
        <li><a href="search.html">Search</a></li>
      </ul>
      <div class="nav-actions">
        <button class="lang-toggle">عربي</button>
        <button class="theme-toggle"><span class="icon-sun">☀️</span><span class="icon-moon">🌙</span></button>
        <button class="nav-hamburger"><span>☰</span></button>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="chat-layout">
      <div class="chat-sidebar">
        <div class="chat-sidebar-header">
          <h3 class="mb-sm">💬 Chats</h3>
          <input type="text" placeholder="Search conversations...">
        </div>
        <div id="chat-contacts"></div>
      </div>
      <div class="chat-main">
        <div class="chat-header">
          <div class="avatar avatar-md full-center" id="chat-header-avatar"
               style="background:var(--primary);color:white;min-width:48px;font-weight:700;">?</div>
          <div class="chat-user-info">
            <h4 id="chat-partner-name">Select a conversation</h4>
            <span id="chat-partner-status"></span>
          </div>
        </div>
        <div class="chat-messages" id="chat-messages">
          <div class="full-center" style="height:100%;color:var(--text-muted);">
            <div class="text-center">
              <div style="font-size:4rem;margin-bottom:var(--space-md);">💬</div>
              <p>Select a conversation to start chatting.</p>
            </div>
          </div>
        </div>
        <div class="chat-input-area">
          <input type="text" id="chat-input" placeholder="Type a message... 🥊">
          <button class="btn btn-primary" onclick="sendMessage()">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/chat.js"></script>
</body>
</html>
