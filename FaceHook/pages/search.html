<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Search boxers and fighters on FaceHook.">
  <title>Search Fighters — FaceHook</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/search.css">
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo">
        <img src="../assets/images/logo.png" alt="FaceHook Logo">
        <span>Face</span><span class="logo-hook">Hook</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html" data-en="Home" data-ar="الرئيسية">Home</a></li>
        <li><a href="feed.html" data-en="Feed" data-ar="المنشورات">Feed</a></li>
        <li><a href="search.html" class="active" data-en="Search" data-ar="بحث">Search</a></li>
        <li><a href="trending.html" data-en="Trending" data-ar="رائج">Trending</a></li>
      </ul>
      <div class="nav-actions">
        <button class="lang-toggle">عربي</button>
        <button class="theme-toggle"><span class="icon-sun">☀️</span><span class="icon-moon">🌙</span></button>
        <button class="nav-hamburger"><span>☰</span></button>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="search-page">
      <h1 class="mb-lg" data-en="🔍 Search Fighters" data-ar="🔍 ابحث عن مقاتلين">🔍 Search Fighters</h1>

      <!-- Search Bar -->
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search by name, username, weight class...">
        <button class="btn btn-primary" onclick="searchUsers()" data-en="Search" data-ar="بحث">Search</button>
      </div>

      <!-- Filters -->
      <div class="search-controls">
        <div class="search-filters">
          <button class="filter-chip active" onclick="setFilter('all', this)">All</button>
          <button class="filter-chip" onclick="setFilter('heavyweight', this)">Heavyweight</button>
          <button class="filter-chip" onclick="setFilter('middleweight', this)">Middleweight</button>
          <button class="filter-chip" onclick="setFilter('welterweight', this)">Welterweight</button>
          <button class="filter-chip" onclick="setFilter('lightweight', this)">Lightweight</button>
        </div>
      </div>

      <!-- Results Info -->
      <div class="results-info" id="results-count">Showing 1-6 of 18 fighters</div>

      <!-- Results Container -->
      <div id="search-results" class="search-results-list"></div>

      <!-- Pagination -->
      <div class="pagination" id="search-pagination"></div>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/search.js"></script>
</body>
</html>
