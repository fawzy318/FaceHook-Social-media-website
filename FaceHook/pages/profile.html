<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="User Profile on FaceHook — Follow, chat, and see posts.">
  <title>Profile — FaceHook</title>
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/themes.css">
  <link rel="stylesheet" href="../css/components.css">
  <link rel="stylesheet" href="../css/profile.css">
  <link rel="stylesheet" href="../css/feed.css">
  <link rel="icon" href="../assets/images/logo.png" type="image/png">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo">
        <img src="../assets/images/logo.png" alt="FaceHook">
        <span>Face</span><span class="logo-hook">Hook</span>
      </a>
      <ul class="nav-links" id="nav-links">
        <li><a href="../index.html">Home</a></li>
        <li><a href="feed.html">Feed</a></li>
        <li><a href="search.html">Search</a></li>
        <li><a href="trending.html">Trending</a></li>
      </ul>
      <div class="nav-actions">
        <button class="lang-toggle">عربي</button>
        <button class="theme-toggle"><span class="icon-sun">☀️</span><span class="icon-moon">🌙</span></button>
        <button class="nav-hamburger"><span>☰</span></button>
      </div>
    </div>
  </nav>

  <div class="page-wrapper">
    <!-- Cover Photo -->
    <div class="profile-cover">
      <div class="cover-overlay" style="background:var(--primary);height:200px;"></div>
    </div>

    <!-- Profile Info -->
    <div class="profile-info-section">
      <div class="profile-info">
        <div class="profile-avatar-wrapper">
          <div class="avatar avatar-2xl full-center" id="profile-avatar-initials"
               style="background:var(--primary);font-size:3rem;color:white;border:4px solid var(--bg-primary);font-weight:800;">?</div>
        </div>
        <div class="profile-details">
          <h1 id="profile-display-name">Loading...</h1>
          <p class="username" id="profile-username">@...</p>
          <p class="bio" id="profile-bio"></p>
          <div class="profile-stats">
            <div class="stat"><div class="stat-num" id="profile-post-count">0</div><div class="stat-label">Posts</div></div>
            <div class="stat"><div class="stat-num" id="follower-count">0</div><div class="stat-label">Followers</div></div>
            <div class="stat"><div class="stat-num" id="following-count">0</div><div class="stat-label">Following</div></div>
          </div>
        </div>
        <div class="profile-actions" id="profile-actions"></div>
      </div>
    </div>

    <!-- Profile Content -->
    <div class="profile-content">
      <div class="tabs">
        <button class="tab active" data-tab="tab-posts">Posts</button>
        <button class="tab" data-tab="tab-about">About</button>
      </div>

      <div class="profile-grid">
        <aside>
          <div class="card about-card">
            <h3>About</h3>
            <div id="profile-about-info">
              <p class="text-muted">Loading...</p>
            </div>
          </div>
        </aside>
        <div>
          <div class="tab-content active" id="tab-posts">
            <div id="profile-posts">
              <div class="text-center pad-xl text-muted"><p>Loading posts...</p></div>
            </div>
          </div>
          <div class="tab-content" id="tab-about">
            <div class="card pad-xl">
              <h3 class="mb-lg">User Information</h3>
              <div id="profile-about-details"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- REPORT MODAL -->
  <div class="modal-overlay" id="report-modal">
    <div class="modal">
      <div class="modal-header"><h3>Report User</h3><button class="modal-close">&times;</button></div>
      <div class="form-group">
        <label for="report-reason">Reason</label>
        <select id="report-reason">
          <option value="">Select a reason...</option>
          <option value="spam">Spam or fake account</option>
          <option value="harassment">Harassment</option>
          <option value="inappropriate">Inappropriate content</option>
          <option value="other">Other</option>
        </select>
      </div>
      <div class="form-group">
        <label for="report-details">Details</label>
        <textarea id="report-details" rows="4" placeholder="Describe the issue..."></textarea>
      </div>
      <button class="btn btn-danger btn-full" onclick="submitReport()">Submit Report</button>
    </div>
  </div>

  <!-- EDIT PROFILE MODAL -->
  <div class="modal-overlay" id="edit-profile-modal">
    <div class="modal">
      <div class="modal-header"><h3>Edit Profile</h3><button class="modal-close">&times;</button></div>
      <div class="form-group">
        <label for="edit-display-name">Display Name</label>
        <input type="text" id="edit-display-name">
      </div>
      <div class="form-group">
        <label for="edit-bio">Bio</label>
        <textarea id="edit-bio" rows="4"></textarea>
      </div>
      <button class="btn btn-primary btn-full" onclick="saveProfile()">Save Changes</button>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/profile.js"></script>
</body>
</html>
